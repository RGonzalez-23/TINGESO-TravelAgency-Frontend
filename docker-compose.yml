services:
  frontend:
    build:
      context: .
    image: travel-frontend:latest
    networks:
      - shared_travel_net

  nginx:
    image: nginx:alpine
    container_name: travel_loadbalancer
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
    networks:
      - shared_travel_net

networks:
  # El frontend asume que esta red ya fue creada por el Docker Compose del Backend
  shared_travel_net:
    external: true
    name: travel_network
